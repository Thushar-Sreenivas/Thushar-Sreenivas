<svg viewBox="0 0 800 100" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <style>
      @keyframes float-spark {
        0% { transform: translateY(0px) scale(1); opacity: 0.8; }
        100% { transform: translateY(-20px) scale(0.5); opacity: 0; }
      }
      .spark1 { animation: float-spark 3s ease-in infinite; }
      .spark2 { animation: float-spark 4s ease-in infinite; }
      .spark3 { animation: float-spark 5s ease-in infinite; }
    </style>
  </defs>

  <path d="M 100 50 Q 400 80 700 30" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 6" opacity="0.4"/>
  
  <g transform="translate(680, 30)">
    <circle cx="0" cy="0" r="4" fill="#581c87" opacity="0.8"/>
    <circle cx="10" cy="-5" r="2.5" fill="#14b8a6" class="spark1" style="animation-delay: 0s;"/>
    <circle cx="-5" cy="10" r="2" fill="#14b8a6" class="spark2" style="animation-delay: -1s;"/>
    <circle cx="20" cy="5" r="1.5" fill="#94a3b8" class="spark3" style="animation-delay: -2s;"/>
  </g>
  
  <g transform="translate(400, 65)">
    <circle cx="0" cy="0" r="2" fill="#581c87" opacity="0.5"/>
    <circle cx="5" cy="-5" r="1.5" fill="#14b8a6" class="spark1" style="animation-delay: -1.5s;"/>
  </g>

  <g transform="translate(150, 55)">
    <circle cx="0" cy="0" r="1.5" fill="#94a3b8" opacity="0.5"/>
    <circle cx="8" cy="-3" r="1" fill="#14b8a6" class="spark2" style="animation-delay: -3s;"/>
  </g>
</svg>
