<svg viewBox="0 0 800 160" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <style>
      .text-label { font-family: Georgia, serif; font-size: 14px; fill: #334155; font-weight: bold; text-anchor: middle; }
      .book-title { font-family: monospace; font-size: 10px; fill: #334155; transform-origin: center; transform: rotate(-90deg); text-anchor: middle; }
    </style>
  </defs>

  <text x="400" y="20" class="text-label" font-size="18">Backend Runes</text>

  <!-- Shelf -->
  <rect x="100" y="140" width="600" height="10" fill="#eab308" opacity="0.6" rx="3"/>

  <!-- Node.js Book -->
  <g transform="translate(250, 40)">
    <rect x="0" y="0" width="50" height="100" rx="4" fill="#ffffff" stroke="#eab308" stroke-width="2"/>
    <polygon points="25,15 40,22 40,38 25,45 10,38 10,22" fill="none" stroke="#22c55e" stroke-width="2"/>
    <text x="25" y="70" class="book-title">NODE.JS</text>
  </g>

  <!-- Go Book -->
  <g transform="translate(375, 45)">
    <rect x="0" y="0" width="50" height="95" rx="4" fill="#bae6fd" stroke="#eab308" stroke-width="2"/>
    <circle cx="20" cy="25" r="4" fill="#0ea5e9"/>
    <circle cx="30" cy="25" r="4" fill="#0ea5e9"/>
    <ellipse cx="25" cy="35" rx="10" ry="5" fill="none" stroke="#0ea5e9" stroke-width="2"/>
    <text x="25" y="65" class="book-title">GOLANG</text>
  </g>

  <!-- PostgreSQL Book -->
  <g transform="translate(490, 50)">
    <rect x="0" y="0" width="45" height="90" rx="4" fill="#ffffff" stroke="#eab308" stroke-width="2"/>
    <ellipse cx="22.5" cy="25" rx="12" ry="5" fill="none" stroke="#0ea5e9" stroke-width="2"/>
    <path d="M 10.5 25 L 10.5 35 A 12 5 0 0 0 34.5 35 L 34.5 25" fill="none" stroke="#0ea5e9" stroke-width="2"/>
    <text x="22.5" y="65" class="book-title">POSTGRES</text>
  </g>
</svg>
