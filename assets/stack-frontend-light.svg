<svg viewBox="0 0 800 160" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <style>
      .text-label { font-family: Georgia, serif; font-size: 14px; fill: #334155; font-weight: bold; text-anchor: middle; }
      .book-title { font-family: monospace; font-size: 10px; fill: #334155; transform-origin: center; transform: rotate(-90deg); text-anchor: middle; }
    </style>
  </defs>

  <text x="400" y="20" class="text-label" font-size="18">Frontend Spells</text>

  <!-- Shelf -->
  <rect x="100" y="140" width="600" height="10" fill="#eab308" opacity="0.6" rx="3"/>

  <!-- React Book -->
  <g transform="translate(250, 40)">
    <rect x="0" y="0" width="50" height="100" rx="4" fill="#bae6fd" stroke="#eab308" stroke-width="2"/>
    <circle cx="25" cy="30" r="12" fill="none" stroke="#0ea5e9" stroke-width="2"/>
    <ellipse cx="25" cy="30" rx="18" ry="6" fill="none" stroke="#0ea5e9" stroke-width="1.5" transform="rotate(60 25 30)"/>
    <ellipse cx="25" cy="30" rx="18" ry="6" fill="none" stroke="#0ea5e9" stroke-width="1.5" transform="rotate(-60 25 30)"/>
    <text x="25" y="70" class="book-title">REACT</text>
  </g>

  <!-- HTML/CSS Book -->
  <g transform="translate(375, 50)">
    <rect x="0" y="0" width="45" height="90" rx="4" fill="#ffffff" stroke="#eab308" stroke-width="2"/>
    <path d="M 15 20 L 35 20 L 32 40 L 25 45 L 18 40 Z" fill="#eab308" opacity="0.8"/>
    <text x="22.5" y="65" class="book-title">HTML/CSS</text>
  </g>

  <!-- Tailwind Book -->
  <g transform="translate(490, 45)">
    <rect x="0" y="0" width="55" height="95" rx="4" fill="#bae6fd" stroke="#eab308" stroke-width="2"/>
    <path d="M 15 35 Q 25 20 35 30 T 45 25" fill="none" stroke="#0ea5e9" stroke-width="3" stroke-linecap="round"/>
    <text x="27.5" y="65" class="book-title">TAILWIND</text>
  </g>
</svg>
