<svg viewBox="0 0 800 160" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <style>
      .text-label { font-family: Georgia, serif; font-size: 14px; fill: #334155; font-weight: bold; text-anchor: middle; }
      .book-title { font-family: monospace; font-size: 10px; fill: #334155; transform-origin: center; transform: rotate(-90deg); text-anchor: middle; }
    </style>
  </defs>

  <text x="400" y="20" class="text-label" font-size="18">Automation Artifacts</text>

  <!-- Shelf -->
  <rect x="100" y="140" width="600" height="10" fill="#eab308" opacity="0.6" rx="3"/>

  <!-- Git Book -->
  <g transform="translate(250, 45)">
    <rect x="0" y="0" width="45" height="95" rx="4" fill="#bae6fd" stroke="#eab308" stroke-width="2"/>
    <path d="M 22.5 15 L 30 22.5 L 22.5 30 L 15 22.5 Z" fill="none" stroke="#f97316" stroke-width="2"/>
    <circle cx="22.5" cy="15" r="2" fill="#f97316"/>
    <circle cx="30" cy="22.5" r="2" fill="#f97316"/>
    <circle cx="15" cy="22.5" r="2" fill="#f97316"/>
    <text x="22.5" y="65" class="book-title">GIT</text>
  </g>

  <!-- GitHub Actions Book -->
  <g transform="translate(375, 40)">
    <rect x="0" y="0" width="55" height="100" rx="4" fill="#ffffff" stroke="#eab308" stroke-width="2"/>
    <path d="M 27.5 15 L 35 25 L 20 25 Z" fill="#0ea5e9"/>
    <path d="M 20 25 L 35 25 L 27.5 35 Z" fill="#0ea5e9" opacity="0.6"/>
    <text x="27.5" y="70" class="book-title">ACTIONS</text>
  </g>

  <!-- Docker Book -->
  <g transform="translate(490, 50)">
    <rect x="0" y="0" width="50" height="90" rx="4" fill="#bae6fd" stroke="#eab308" stroke-width="2"/>
    <path d="M 15 25 Q 25 35 35 25" fill="none" stroke="#0ea5e9" stroke-width="2"/>
    <rect x="20" y="18" width="4" height="4" fill="#0ea5e9"/>
    <rect x="25" y="18" width="4" height="4" fill="#0ea5e9"/>
    <rect x="25" y="13" width="4" height="4" fill="#0ea5e9"/>
    <text x="25" y="65" class="book-title">DOCKER</text>
  </g>
</svg>
