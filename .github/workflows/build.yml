name: Build Profile README

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - 'README.md'
      - 'assets/images/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build template and assets
        run: npm run build

      - name: Commit generated files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-generate README and assets"
          file_pattern: "README.md assets/images/*"
